<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عمارة العطاء | شقق فاخرة للبيع — نابلس</title>
<meta name="description" content="عمارة العطاء — شقق فاخرة ومحلات تجارية للبيع في نابلس، رفيديا، شارع تونس. تبدأ الأسعار من 56,800 دينار نقداً. 5 شقق و3 محلات متاحة.">
<meta property="og:title" content="عمارة العطاء | شقق فاخرة للبيع — نابلس">
<meta property="og:description" content="شقق فاخرة ومحلات تجارية للبيع في نابلس. تصميم عصري، مساحات 142–166 م²، سعر 400 دينار/م².">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F8F6;--ink:#0F0F0D;--mid:#6B6B64;--line:#E2E2DC;
  --gold:oklch(62% 0.07 76);--gold-pale:oklch(96% 0.025 76);
  --green:#2D6A4F;--green-bg:#F0FDF4;
  --ff-d:'Cormorant Garamond',Georgia,serif;
  --ff-ar:'Noto Naskh Arabic',serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--ff-ar);background:var(--bg);color:var(--ink);overflow-x:hidden;line-height:1.75;font-size:1rem}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.25rem 4rem;display:flex;align-items:center;justify-content:space-between;transition:background .4s,box-shadow .4s}
.nav.scrolled{background:rgba(248,248,246,.96);backdrop-filter:blur(16px);box-shadow:0 1px 0 var(--line)}
.nav-logo{font-family:var(--ff-ar);font-size:1.15rem;font-weight:700;letter-spacing:.02em}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{font-size:.85rem;letter-spacing:.02em;text-decoration:none;color:var(--ink);opacity:.65;transition:opacity .2s}
.nav-links a:hover{opacity:1}
.btn-p{display:inline-flex;align-items:center;gap:.5rem;padding:.72rem 1.5rem;background:var(--ink);color:var(--bg);font-family:var(--ff-ar);font-size:.85rem;border:none;cursor:pointer;text-decoration:none;transition:background .2s,transform .15s}
.btn-p:hover{background:#2a2a22;transform:translateY(-1px)}
.btn-o{display:inline-flex;align-items:center;gap:.5rem;padding:.72rem 1.5rem;background:transparent;color:var(--ink);font-family:var(--ff-ar);font-size:.85rem;border:1px solid var(--ink);cursor:pointer;text-decoration:none;transition:all .2s}
.btn-o:hover{background:var(--ink);color:var(--bg)}

/* ── HERO ── */
.hero{height:100vh;min-height:640px;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;position:relative}
/* RTL: first col = right (text), second col = left (photo) */
.hero-text-col{display:flex;flex-direction:column;justify-content:center;padding:0 6rem 0 3rem;z-index:2;position:relative}
.hero-text-col::after{content:'';position:absolute;left:-1px;top:0;bottom:0;width:1px;background:var(--line)}
.hero-eyebrow{font-size:.8rem;letter-spacing:.04em;color:var(--mid);margin-bottom:1.75rem;opacity:0;animation:fadeUp .8s var(--ease) .3s forwards}
.hero-ar{font-family:var(--ff-ar);font-size:clamp(3rem,5.5vw,5.5rem);font-weight:700;line-height:1.2;margin-bottom:.5rem;opacity:0;animation:fadeUp .9s var(--ease) .5s forwards}
.hero-en{font-family:var(--ff-d);font-size:clamp(1.3rem,2vw,2rem);font-weight:300;font-style:italic;color:var(--mid);margin-bottom:2.5rem;opacity:0;animation:fadeUp .9s var(--ease) .7s forwards}
.hero-rule{width:36px;height:1px;background:var(--gold);margin-bottom:1.5rem;opacity:0;animation:fadeUp .7s var(--ease) .95s forwards}
.hero-desc{font-size:.95rem;color:var(--mid);max-width:400px;line-height:2;opacity:0;animation:fadeUp .8s var(--ease) 1.1s forwards}
.hero-cta{display:flex;gap:1rem;margin-top:2.5rem;flex-wrap:wrap;opacity:0;animation:fadeUp .8s var(--ease) 1.3s forwards}

/* Photo col (LEFT in RTL) */
.hero-photo-col{position:relative;overflow:hidden;opacity:0;animation:slideInL 1.3s var(--ease) .15s forwards}
.hero-photo-col img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;filter:brightness(.96) contrast(1.02)}
.hero-photo-col::before{content:'';position:absolute;right:0;top:0;bottom:0;width:40%;background:linear-gradient(to left,var(--bg),transparent);z-index:1;pointer-events:none}

.scroll-hint{position:absolute;bottom:2.5rem;right:6rem;display:flex;align-items:center;gap:.75rem;opacity:0;animation:fadeUp 1s ease 2s forwards;z-index:3}
.scroll-hint span{font-size:.75rem;letter-spacing:.04em;color:var(--mid)}
.scroll-line{width:36px;height:1px;background:var(--gold);position:relative;overflow:hidden}
.scroll-line::after{content:'';position:absolute;top:0;right:-100%;width:100%;height:100%;background:var(--ink);animation:scrollMove 1.8s ease-in-out 2.5s infinite}

/* ── SECTION BASE ── */
.sec{padding:7rem 6rem}
.sec-label{font-size:.78rem;letter-spacing:.04em;color:var(--gold);margin-bottom:.875rem}
.sec-title{font-family:var(--ff-ar);font-size:clamp(1.9rem,3vw,2.8rem);font-weight:700;line-height:1.35;margin-bottom:1.1rem}
.sec-rule{width:36px;height:1px;background:var(--gold);margin-bottom:2.5rem}

/* ── ABOUT ── */
.about{background:var(--ink);color:var(--bg)}
.about .sec-title{color:var(--bg)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;margin-top:3rem}
.about-p{font-size:.95rem;line-height:2;opacity:.75;margin-bottom:1rem}
.stats-row{display:flex;gap:3.5rem;margin-top:3rem;padding-top:2.5rem;border-top:1px solid rgba(248,248,246,.1)}
.stat-n{font-family:var(--ff-d);font-size:2.75rem;font-weight:400;color:var(--gold);line-height:1}
.stat-l{font-size:.8rem;opacity:.45;margin-top:.3rem}
.hl-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.hl-card{padding:1.75rem;border:1px solid rgba(248,248,246,.08);transition:border-color .3s}
.hl-card:hover{border-color:var(--gold)}
.hl-icon{width:26px;height:26px;opacity:.55;margin-bottom:.9rem}
.hl-t{font-size:.85rem;font-weight:600;margin-bottom:.4rem}
.hl-d{font-size:.88rem;opacity:.5;line-height:1.9}

/* ── BUILDING EXPLORER ── */
.bld-sec{padding:7rem 6rem;background:var(--bg)}
.bld-intro{font-size:.95rem;color:var(--mid);max-width:640px;line-height:2;margin-bottom:3rem}

/* Cross-section diagram */
.bld-diagram{border:1.5px solid var(--ink);overflow:hidden;width:100%}
.bld-row{display:flex;border-bottom:1px solid var(--line);min-height:88px}
.bld-row:last-child{border-bottom:none}

/* Floor label — in RTL flex, first child = RIGHT side ✓ */
.bld-lbl{width:96px;flex-shrink:0;background:var(--ink);color:var(--bg);padding:.875rem .875rem;display:flex;flex-direction:column;justify-content:center;gap:.2rem;border-left:1px solid rgba(248,248,246,.1)}
.bld-lbl-main{font-size:.78rem;font-weight:600;line-height:1.2;font-family:var(--ff-ar)}
.bld-lbl-sub{font-size:.65rem;opacity:.45;margin-top:.1rem;font-family:var(--ff-ar)}

.bld-cells{flex:1;display:flex}

/* Sold-out entire floor */
.bld-row.row-soldout .bld-cells{background:repeating-linear-gradient(135deg,#F0F0EC 0,#F0F0EC 8px,#E9E9E5 8px,#E9E9E5 16px);align-items:center;justify-content:center}
.sold-banner{display:flex;align-items:center;gap:.625rem;color:#A0A09A}
.sold-banner span{font-size:.78rem;font-family:var(--ff-ar)}
.sold-banner svg{opacity:.4}

/* Unit cells */
.unit-cell{flex:1;border-left:1px solid var(--line);padding:.875rem 1rem;display:flex;flex-direction:column;position:relative;overflow:hidden;min-width:0}
.unit-cell:last-child{border-left:none}
.unit-avail{background:#fff;border-top:3px solid var(--green);cursor:pointer;transition:background .18s,box-shadow .18s}
.unit-avail:hover{background:#F6FCF8;box-shadow:inset 0 0 0 1.5px var(--green)}
.unit-sold-cell{background:repeating-linear-gradient(135deg,#F0F0EC 0,#F0F0EC 6px,#E8E8E4 6px,#E8E8E4 12px);border-top:3px solid transparent;cursor:not-allowed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.35rem;opacity:.7}
.unit-sold-txt{font-size:.72rem;font-family:var(--ff-ar);color:#9A9A92}
.unit-name-sm{font-size:.82rem;font-weight:600;margin-bottom:.2rem;font-family:var(--ff-ar)}
.unit-area{font-family:var(--ff-d);font-size:1.1rem;color:var(--mid);line-height:1.1}
.unit-net{font-size:.68rem;color:var(--mid);opacity:.7;margin-top:.05rem;font-family:var(--ff-ar)}
.unit-price-sm{font-family:var(--ff-d);font-size:1.05rem;margin-top:auto;padding-top:.5rem}
.unit-badge{display:inline-block;font-size:.65rem;padding:.18rem .55rem;background:var(--green-bg);color:var(--green);margin-top:.35rem;border:1px solid rgba(45,106,79,.2);font-family:var(--ff-ar)}

/* Shops row */
.shops-row{flex:1;display:grid;grid-template-columns:repeat(10,1fr)}
.shop-cell{border-left:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;padding:.625rem .2rem;position:relative}
.shop-cell:first-child{border-left:none}
.shop-avail{background:#fff;border-top:3px solid var(--green);cursor:pointer;transition:background .18s}
.shop-avail:hover{background:#F6FCF8}
.shop-sold{background:repeating-linear-gradient(135deg,#EFEFEB 0,#EFEFEB 5px,#E8E8E4 5px,#E8E8E4 10px);border-top:3px solid transparent;cursor:not-allowed}
.shop-id{font-size:.65rem;color:var(--mid);font-weight:600;font-family:var(--ff-ar)}
.shop-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* Legend */
.legend-bar{display:flex;gap:2rem;margin-top:1.5rem;padding:1.25rem 1.5rem;background:#F2F2EE;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--mid)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Price table */
.price-tbl{width:100%;border-collapse:collapse;font-size:.88rem;margin-top:2.5rem}
.price-tbl th{background:var(--ink);color:var(--bg);padding:.875rem 1rem;text-align:right;font-weight:500;font-size:.78rem;font-family:var(--ff-ar)}
.price-tbl td{padding:.875rem 1rem;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle}
.price-tbl tbody tr{cursor:pointer;transition:background .15s}
.price-tbl tbody tr:nth-child(even){background:white}
.price-tbl tbody tr:nth-child(odd){background:#F8F8F6}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(10,10,8,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;animation:fadeIn .25s ease forwards}
.modal{background:var(--bg);max-width:760px;width:100%;max-height:92vh;overflow-y:auto;opacity:0;transform:translateY(24px);animation:slideUp .35s var(--ease) forwards;display:flex;flex-direction:column}
.modal-hdr{padding:1.75rem 2rem 1.5rem;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.modal-eyebrow{font-size:.75rem;color:var(--mid);margin-bottom:.3rem;font-family:var(--ff-ar)}
.modal-title{font-family:var(--ff-ar);font-size:1.9rem;font-weight:700;line-height:1.2}
.modal-close{background:none;border:none;cursor:pointer;color:var(--mid);padding:.3rem;transition:color .2s;flex-shrink:0;margin-top:.25rem}
.modal-close:hover{color:var(--ink)}
.badge-avail{display:inline-block;font-size:.72rem;padding:.25rem .7rem;background:var(--green-bg);color:var(--green);border:1px solid rgba(45,106,79,.22);margin-top:.65rem;font-family:var(--ff-ar)}

/* Modal tabs */
.tab-nav{display:flex;border-bottom:1px solid var(--line);flex-shrink:0}
.tab-btn{padding:.9rem 1.75rem;background:none;border:none;border-bottom:2px solid transparent;font-family:var(--ff-ar);font-size:.85rem;color:var(--mid);cursor:pointer;transition:all .18s;margin-bottom:-1px}
.tab-btn.on{color:var(--ink);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.on){color:var(--ink)}
.modal-body{padding:2rem;flex:1}
.plan-img{width:100%;display:block;max-height:500px;object-fit:contain;background:#F4F4F0}
.modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.875rem;margin-bottom:1.75rem}
.ms{text-align:center;padding:1.1rem .5rem;background:var(--gold-pale)}
.ms-v{font-family:var(--ff-d);font-size:1.4rem;font-weight:400;line-height:1}
.ms-l{font-size:.72rem;color:var(--mid);margin-top:.3rem;font-family:var(--ff-ar)}
.modal-row{margin-bottom:1.25rem}
.modal-row-l{font-size:.72rem;color:var(--mid);margin-bottom:.3rem;font-family:var(--ff-ar)}
.modal-row-v{font-size:.95rem;line-height:1.85;font-family:var(--ff-ar)}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.price-box{padding:1.5rem;text-align:center}
.price-cash{background:var(--gold-pale);border:1px solid rgba(180,140,60,.22)}
.price-install{background:#F4F4F0;border:1px solid var(--line)}
.price-lbl{font-size:.78rem;color:var(--mid);margin-bottom:.75rem;font-family:var(--ff-ar)}
.price-main{font-family:var(--ff-d);font-size:2rem;font-weight:400;line-height:1;margin-bottom:.25rem}
.price-sub{font-size:.75rem;color:var(--mid);font-family:var(--ff-ar)}
.payment-plan{padding:1.25rem;background:#FFFBEB;border:1px solid rgba(200,160,50,.25);margin-bottom:1.5rem;border-right:3px solid oklch(72% 0.09 76)}
.payment-lbl{font-size:.72rem;color:#92600A;margin-bottom:.6rem;font-family:var(--ff-ar);font-weight:600}
.payment-text{font-size:.92rem;line-height:2.1;font-family:var(--ff-ar);color:#5A4020}
.desc-ar{padding:1.25rem;background:#FAFAF6;border-right:3px solid var(--gold);font-family:var(--ff-ar);font-size:.9rem;line-height:2.2;color:var(--mid);margin-top:1.25rem}
.modal-actions{display:flex;gap:.875rem;margin-top:1.5rem;flex-wrap:wrap}

/* ── CONTACT ── */
.contact-grid{display:flex;flex-direction:column;gap:2.5rem;margin-top:3rem}
.media-row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.contact-h3{font-family:var(--ff-ar);font-size:1.55rem;font-weight:700;margin-bottom:1rem}
.contact-p{font-size:.95rem;color:var(--mid);line-height:2;margin-bottom:2rem}
.wa-btn{display:inline-flex;align-items:center;gap:.75rem;padding:1rem 1.75rem;background:#25D366;color:white;font-size:.9rem;font-family:var(--ff-ar);text-decoration:none;border:none;cursor:pointer;transition:all .2s}
.wa-btn:hover{background:#1DAA57;transform:translateY(-1px)}
.office-box{margin-top:2rem;padding:1.5rem;background:#F2F2EE;border-right:2px solid var(--gold)}
.office-l{font-size:.72rem;color:var(--mid);margin-bottom:.65rem;font-family:var(--ff-ar);font-weight:600}
.office-t{font-size:.9rem;line-height:2.2;font-family:var(--ff-ar)}
.form-f{margin-bottom:1.1rem}
.form-f label{display:block;font-size:.78rem;color:var(--mid);margin-bottom:.45rem;font-family:var(--ff-ar)}
.form-f input,.form-f textarea{width:100%;padding:.875rem 1rem;border:1px solid var(--line);background:white;font-family:var(--ff-ar);font-size:.92rem;outline:none;resize:none;transition:border-color .2s;text-align:right;direction:rtl}
.form-f input:focus,.form-f textarea:focus{border-color:var(--ink)}
.form-ok{padding:1.25rem;background:var(--gold-pale);border:1px solid rgba(180,140,60,.3);font-size:.9rem;color:#7A5A10;font-family:var(--ff-ar)}

/* ── FOOTER ── */
footer{padding:2.5rem 6rem;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.ft-brand{font-family:var(--ff-ar);font-size:1rem;font-weight:600}
.ft-credit{font-size:.82rem;color:var(--mid);font-family:var(--ff-ar)}
.ft-credit a{color:var(--gold);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s}
.ft-credit a:hover{border-color:var(--gold)}

/* ── FAB ── */
.fab{position:fixed;bottom:2rem;left:2rem;z-index:150;width:54px;height:54px;border-radius:50%;background:#25D366;color:white;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 4px 24px rgba(37,211,102,.42);transition:transform .2s,box-shadow .2s;opacity:0;animation:fadeUp .6s ease 2.2s forwards}
.fab:hover{transform:scale(1.1) translateY(-2px);box-shadow:0 8px 32px rgba(37,211,102,.52)}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInL{from{opacity:0;transform:translateX(-80px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes slideUp{to{transform:translateY(0);opacity:1}}
@keyframes scrollMove{from{right:-100%}to{right:100%}}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.rates-skeleton{display:inline-block;width:220px;height:14px;border-radius:3px;background:linear-gradient(90deg,#e8e8e0 0%,#f5f5ef 50%,#e8e8e0 100%);background-size:400px 100%;animation:shimmer 1.4s linear infinite}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .hero{grid-template-columns:1fr}
  .hero-photo-col{display:none}
  .hero-text-col{padding:8rem 2rem 4rem}
  .sec,.bld-sec,.about{padding:5rem 2rem}
  .about-grid{grid-template-columns:1fr;gap:3rem}
  .media-row{grid-template-columns:1fr}
  .modal-stats{grid-template-columns:repeat(2,1fr)}
  .modal-actions{flex-direction:column}
  .bld-lbl{width:72px;padding:.75rem .5rem}
  .bld-lbl-sub{display:none}
  .shops-row{grid-template-columns:repeat(5,1fr)}
  .nav{padding:1rem 1.5rem}
  .nav-links{display:none}
  footer{padding:2rem;flex-direction:column;gap:.75rem;text-align:center}
  .price-grid{grid-template-columns:1fr}
  .price-tbl{font-size:.78rem}
  .price-tbl th,.price-tbl td{padding:.625rem .5rem}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── HELPER ────────────────────────────────────────────────────────────────*/
const fmtJD = n => `${n.toLocaleString('en-US')} دينار`;

/* ─── BUILDING DATA ─────────────────────────────────────────────────────────*/
const APTS = {
  APT1:{

  },
  APT2:{

    ppm:400,ppmi:440,down:25000,monthly:500,

    orientation:'مفتوحة على الاتجاهات الأربعة',
    special:'مفتوحة على جميع الاتجاهات — إضاءة طبيعية وافرة',
    descAr:'الشقة الثانية والواقعة في الطابق الأول، ومساحتها الصافية 146 مترا مربعا، ومساحتها الإجمالية هي 157 مترا مربعا. ومن مزاياها أنها مفتوحة على الاتجاهات الأربعة.',
    image:'APP2.webp',

/* ─── UNIT MODAL ─────────────────────────────────────────────────────────────*/
function UnitModal({ unit, onClose }) {
  const [tab, setTab] = useState('plan');
  const [lightbox, setLightbox] = useState(false);
  const apt = unit.type==='apt' ? unit.data : null;
  const isShop = unit.type==='shop';
  const shop = isShop ? unit.data : null;

  useEffect(()=>{
    window.history.pushState({modal:true},'');
    const onPop = ()=>onClose();
    window.addEventListener('popstate',onPop);
    const h = e=>{ if(e.key==='Escape') onClose(); };
    window.addEventListener('keydown',h);
    document.body.style.overflow='hidden';
    return ()=>{
      window.removeEventListener('popstate',onPop);
      window.removeEventListener('keydown',h);
      document.body.style.overflow='';
      if(window.history.state&&window.history.state.modal) window.history.back();
    };
  },[]);

  const waMsg = apt
    ? `أهلاً، أرغب في الاستفسار عن ${apt.ar} (رقم ${apt.num}) في عمارة العطاء. المساحة الإجمالية: ${apt.totalArea}م²، السعر نقداً: ${fmtJD(apt.cashPrice)}`
    : `أهلاً، أرغب في الاستفسار عن ${unit.label} في عمارة العطاء.${shop&&shop.area?' المساحة: '+shop.area+' م²':''}`;

  return (
    <>
    {lightbox && apt && (
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.93)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',cursor:'zoom-out'}} onClick={()=>setLightbox(false)}>
        <img src={apt.image} alt="مخطط" style={{maxWidth:'95vw',maxHeight:'95vh',objectFit:'contain'}}/>

      </div>
    )}

      <div className="modal">
        <div className="modal-hdr">
          <div>
            <div className="modal-eyebrow">
              {isShop ? 'محل تجاري · الطابق الأرضي' : `الوحدة رقم ${apt.num} · ${apt.level}`}
            </div>
            <div className="modal-title">{isShop ? unit.label : apt.ar}</div>
            <span className="badge-avail">متاح للبيع</span>
          </div>
          <button className="modal-close" onClick={onClose}>
            <svg viewBox="0 0 14 14" width={16} fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round">
              <path d="M1 1l12 12M13 1L1 13"/>
            </svg>
          </button>
        </div>

        {apt && (
          <div className="tab-nav">
            {[['plan','المخطط'],['details','التفاصيل'],['pricing','الأسعار']].map(([k,l])=>(
              <button key={k} className={`tab-btn${tab===k?' on':''}`} onClick={()=>setTab(k)}>{l}</button>
            ))}
          </div>

        <div className="modal-body">

            <>
              <div style={{padding:'2rem',background:'var(--gold-pale)',textAlign:'center',borderBottom:'1px solid var(--line)',marginBottom:'1.5rem'}}>
                <div style={{fontFamily:'var(--ff-ar)',fontSize:'1.5rem',fontWeight:700,marginBottom:'.5rem'}}>{unit.label} — الطابق الأرضي</div>
                <div style={{fontSize:'.9rem',color:'var(--mid)',fontFamily:'var(--ff-ar)'}}>موقع استراتيجي على الشارع الرئيسي — عمارة العطاء</div>
              </div>
              {shop && (
                <div className="modal-stats" style={{marginBottom:'1.5rem'}}>

/* ─── BUILDING DIAGRAM ───────────────────────────────────────────────────────*/
function BuildingDiagram({ onUnit }) {
  return (
    <div className="bld-diagram">
      {BLDG_FLOORS.map(floor => (
        <div key={floor.id} className={`bld-row${floor.soldOut?' row-soldout':''}`}>
          <div className="bld-lbl">
            <span className="bld-lbl-main">{floor.main}</span>
            <span className="bld-lbl-sub">{floor.sub}</span>
          </div>
          <div className="bld-cells">
            {floor.soldOut ? (
              <div className="sold-banner">
                <LockIcon size={15}/>
                <span>مباع بالكامل — جميع الوحدات مباعة</span>
              </div>
            ) : floor.units.map((u,i) => {
              const isApt = u.type==='apt';
              return isApt ? (
                <div
                  key={u.data.id}
                  className={`unit-cell unit-avail${u.full?' unit-full':''}`}
                  onClick={()=>onUnit(u)}
                  role="button" tabIndex={0}
                  onKeyDown={e=>e.key==='Enter'&&onUnit(u)}
                >
                  <div className="unit-name-sm">{u.data.ar}</div>
                  <div className="unit-area">{u.data.totalArea} م²</div>
                  <div className="unit-net">صافية: {u.data.netArea} م²</div>
                  <div className="unit-price-sm">{fmtJD(u.data.cashPrice)}</div>
                  <span className="unit-badge">متاح</span>
                </div>
              ) : (
                <div key={i} className="unit-cell unit-sold-cell">
                  <LockIcon size={13}/>
                  <div className="unit-sold-txt">مباع</div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* Commercial shops */}
      <div className="bld-row">
        <div className="bld-lbl">
          <span className="bld-lbl-main">الطابق التجاري</span>
          <span className="bld-lbl-sub">أرضي</span>
        </div>
        <div className="bld-cells" style={{display:'block'}}>
          <div className="shops-row">
            {SHOPS.map(shop => (
              <div
                key={shop.id}
                className={`shop-cell ${shop.available?'shop-avail':'shop-sold'}`}
                onClick={()=>shop.available&&onUnit({type:'shop',label:shop.ar||`محل رقم ${shop.num}`,data:shop})}
                role={shop.available?'button':undefined}
                tabIndex={shop.available?0:undefined}
                title={shop.available?`${shop.id} — متاح`:`${shop.id} — مباع`}
              >
                <span className="shop-id">{shop.id}</span>
                {shop.available
                  ? <div className="shop-dot"/>
                  : <span style={{opacity:.28}}><LockIcon size={10}/></span>
                }
              </div>
            ))}
          </div>
          <div style={{padding:'.4rem .875rem',fontSize:'.72rem',color:'var(--mid)',borderTop:'1px solid var(--line)',background:'#F4F4F0',fontFamily:'var(--ff-ar)'}}>
            10 محلات تجارية — 3 متاحة (محل 4، 5، 6) · 7 مباعة
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── LAZY MAP ─────────────────────────────────────────────────────────────── */
function LazyMap({ src }) {
  const [show, setShow] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    if(!ref.current || show) return;
    const obs = new IntersectionObserver((entries)=>{
      if(entries[0].isIntersecting){ setShow(true); obs.disconnect(); }
    },{rootMargin:'200px'});
    obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[show]);
  return (
    <div ref={ref} style={{width:'100%',height:'100%',background:'#E8E8E0',display:'flex',alignItems:'center',justifyContent:'center'}}>
      {show ? (
        <iframe src={src} width="100%" height="320" style={{border:0,display:'block'}}
          allowFullScreen loading="lazy" referrerPolicy="no-referrer-when-downgrade"/>
      ) : (
        <div style={{fontFamily:'var(--ff-ar)',color:'#888',fontSize:'.9rem'}}>جاري تحميل الخريطة…</div>
      )}
    </div>
  );
}

/* ─── ERROR BOUNDARY ───────────────────────────────────────────────────────── */
class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:false}; }
  static getDerivedStateFromError(){ return {err:true}; }
  componentDidCatch(e){ console.error('App error:', e); }
  render(){
    if(this.state.err) return (
      <div style={{padding:'2rem',textAlign:'center',fontFamily:'var(--ff-ar)'}}>
        <h2>حدث خطأ غير متوقع</h2>
        <p>يرجى تحديث الصفحة أو المحاولة لاحقاً.</p>
        <button onClick={()=>location.reload()} style={{padding:'.5rem 1.5rem',marginTop:'1rem',background:'#2c5530',color:'#fff',border:0,borderRadius:'4px',cursor:'pointer'}}>تحديث الصفحة</button>
      </div>
    );
    return this.props.children;
  }
}

  const [selUnit,  setSelUnit]  = useState(null);
  const [form, setForm]         = useState({name:'',email:'',msg:'',sent:false,loading:false,error:false});
  const [currency, setCurrency]   = useState('JOD');
  const [rates, setRates]         = useState(null);
  const [ratesStatus, setRatesStatus] = useState('loading'); // 'loading' | 'ok' | 'error'

  useEffect(()=>{
    setRatesStatus('loading');
    fetch('https://open.er-api.com/v6/latest/JOD')
      .then(r=>r.ok?r.json():Promise.reject())
      .then(d=>{ setRates({USD:d.rates.USD, ILS:d.rates.ILS}); setRatesStatus('ok'); })
      .catch(()=>setRatesStatus('error'));
  },[]);

  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>60);
    window.addEventListener('scroll',fn);
    return ()=>window.removeEventListener('scroll',fn);
  },[]);

  const availApts  = Object.values(APTS).length;
  const availShops = SHOPS.filter(s=>s.available).length;

  const fmtPrice = (jod) => {
    if(!jod) return '—';
    const v = currency==='JOD'?jod : currency==='USD'?(rates?Math.round(jod*rates.USD):jod) : (rates?Math.round(jod*rates.ILS):jod);
    const n = Math.round(v).toLocaleString('en-US');
    return currency==='JOD'?`${n} دينار`:currency==='USD'?`$${n}`:`₪${n}`;
  };

  return (
    <>
      {/* ── NAV ── */}
      <nav className={`nav${scrolled?' scrolled':''}`}>
        <div style={{display:'flex',alignItems:'center',gap:'.65rem'}}>
          <img src="logo.webp" alt="عمارة العطاء" style={{height:'42px',width:'auto',mixBlendMode:'multiply'}}/>
          <span className="nav-logo">عمارة العطاء</span>
        </div>
        <ul className="nav-links">
          {[['عن العمارة','#about'],['استكشف','#building'],['تواصل','#contact']].map(([l,h])=>(
            <li key={h}><a href={h}>{l}</a></li>
          ))}
        </ul>
        <a href="#building" className="btn-p">شاهد الوحدات المتاحة</a>
      </nav>

      {/* ── HERO ── */}
      <section className="hero" id="hero" data-screen-label="01 الرئيسية">
        {/* In RTL grid: first child → right, second child → left */}
        <div className="hero-text-col">
          <div className="hero-eyebrow">شقق فاخرة · {availApts + availShops} وحدة متاحة · 8 طوابق</div>
          <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'1rem',opacity:0,animation:'fadeUp .8s var(--ease) .2s forwards'}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" width={14} style={{color:'var(--gold)',flexShrink:0}}><path d="M12 22s-8-7.5-8-12a8 8 0 0116 0c0 4.5-8 12-8 12z"/><circle cx={12} cy={10} r={3}/></svg>
            <span style={{fontSize:'.82rem',color:'var(--mid)',fontFamily:'var(--ff-ar)'}}>نابلس، رفيديا، شارع تونس — قرب حياة نابلس</span>
          </div>
          <div className="hero-ar">عمارة العطاء</div>
          <div className="hero-en" style={{fontFamily:'var(--ff-d)',fontStyle:'italic'}}>Al-Ataa Building</div>
          <div className="hero-rule"/>
          <p className="hero-desc">
            عمارة سكنية راقية بتصميم معماري عصري، تضم {availApts} شقق فاخرة و{availShops} محلات تجارية متاحة للبيع — تبدأ الأسعار من {fmtJD(56800)} نقداً.
          </p>
          <div className="hero-cta">
            <a href="#building" className="btn-p" style={{textDecoration:'none'}}>استكشف الوحدات</a>
            <a href="#about"    className="btn-o" style={{textDecoration:'none'}}>عن العمارة</a>
          </div>
        </div>
        <div className="hero-photo-col">
          <img src="building.webp" alt="عمارة العطاء"/>
        </div>
        <div className="scroll-hint">
          <span>اسحب للأسفل</span>
          <div className="scroll-line"/>
        </div>
      </section>

      {/* ── ABOUT ── */}
      <section className="about sec" id="about" data-screen-label="02 عن العمارة">
        <div className="sec-label">عن المشروع</div>
        <h2 className="sec-title" style={{color:'var(--bg)'}}>العمارة الفاخرة بأعلى المعايير</h2>
        <div className="sec-rule"/>
        <div className="about-grid">
          <div>
            <p className="about-p">
              تُعدّ عمارة العطاء نموذجاً متميزاً في العمارة السكنية المعاصرة، صُممت بعناية فائقة لتوفير حياة راقية وعصرية. تجمع العمارة بين جمالية الواجهة الحجرية الأنيقة والتخطيط الداخلي المُحكم الذي يُعظّم الاستفادة من الإضاءة الطبيعية والخصوصية.
            </p>
            <p className="about-p">
              تضم العمارة خمس شقق سكنية فاخرة متاحة للبيع، تتوزع على الطوابق السفلية، إلى جانب ثلاثة محلات تجارية في الطابق الأرضي بموقع استراتيجي على الشارع الرئيسي.
            </p>
            <div className="stats-row">
              {[[availApts,'شقق متاحة'],[availShops,'محلات تجارية'],['400','دينار / م²']].map(([n,l])=>(
                <div key={l}>
                  <div className="stat-n">{n}</div>
                  <div className="stat-l">{l}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="hl-grid">
            {[
              {k:'design',  t:'تصميم عصري',    d:'واجهة حجرية راقية ومواد بناء فاخرة ومخططات داخلية مدروسة بعناية.'},
              {k:'location',t:'موقع متميز',    d:'موقع مركزي مع سهولة الوصول لكافة مرافق وخدمات المدينة.'},
              {k:'home',    t:'مساحات فسيحة',  d:'مساحات تتراوح بين 142–166 م²، مفتوحة على الاتجاهات الأربعة.'},
              {k:'invest',  t:'استثمار مميز',  d:'سعر تنافسي 400 دينار/م² نقداً مع خطة تقسيط مرنة وميسرة.'},
            ].map(({k,t,d})=>(
              <div className="hl-card" key={k}>
                <div className="hl-icon">{ICONS[k]}</div>
                <div className="hl-t">{t}</div>
                <div className="hl-d">{d}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── BUILDING EXPLORER ── */}
      <section className="bld-sec" id="building" data-screen-label="03 المخطط التفاعلي">
        <div className="sec-label">المخطط التفاعلي</div>
        <h2 className="sec-title">استكشف عمارة العطاء</h2>
        <div className="sec-rule"/>
        <p className="bld-intro">
          اضغط على أي <span style={{color:'var(--green)',fontWeight:700}}>وحدة متاحة</span> لعرض المخطط الهندسي والمواصفات والأسعار. الوحدات المباعة موقوفة ولا يمكن فتحها.
        </p>

        <BuildingDiagram onUnit={setSelUnit}/>

        <div className="legend-bar">
          <div className="legend-item"><div className="legend-dot" style={{background:'var(--green)'}}/> متاح — اضغط لعرض التفاصيل</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'#ABABA3',border:'1px solid #ccc'}}/> مباع — الوحدة غير متاحة</div>
          <div style={{marginRight:'auto',fontFamily:'var(--ff-d)',fontSize:'.9rem',color:'var(--ink)'}}>
            {availApts} شقق + {availShops} محلات متاحة الآن
          </div>
        </div>

        {/* Price summary table */}
        {/* Currency switcher */}
        <div style={{display:'flex',alignItems:'center',flexWrap:'wrap',gap:'.75rem',marginTop:'2.5rem',padding:'1rem 1.25rem',background:'#F2F2EE',borderRight:'3px solid var(--gold)'}}>
          <span style={{fontSize:'.82rem',color:'var(--mid)',fontFamily:'var(--ff-ar)',fontWeight:600}}>عرض الأسعار بـ:</span>
          {[['JOD','دينار أردني','JD'],['USD','دولار أمريكي','$'],['ILS','شيكل إسرائيلي','₪']].map(([c,l,sym])=>(
            <button key={c} onClick={()=>setCurrency(c)} style={{padding:'.4rem 1rem',border:'1px solid',borderColor:currency===c?'var(--ink)':'var(--line)',background:currency===c?'var(--ink)':'white',color:currency===c?'var(--bg)':'var(--mid)',fontFamily:'var(--ff-ar)',fontSize:'.82rem',cursor:'pointer',transition:'all .18s',borderRadius:'2px'}}>
              {sym} {l}
            </button>
          ))}
          {ratesStatus==='ok' && rates && (
            <span style={{fontSize:'.72rem',color:'var(--mid)',fontFamily:'var(--ff-ar)',marginRight:'auto'}}>1 دينار = ${rates.USD?.toFixed(3)} | ₪{rates.ILS?.toFixed(2)} · محدّث يومياً</span>
          )}
          {ratesStatus==='loading' && (
            <span className="rates-skeleton" style={{marginRight:'auto'}}/>
          )}
          {ratesStatus==='error' && (
            <span style={{fontSize:'.72rem',color:'#c0392b',fontFamily:'var(--ff-ar)',marginRight:'auto'}}>تعذّر تحميل أسعار الصرف · الأسعار بالدينار فقط</span>
          )}
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="price-tbl">
            <thead>
              <tr>
                {['الوحدة','الطابق','المساحة الصافية','المساحة الإجمالية','السعر نقداً','سعر التقسيط'].map(h=>(
                  <th key={h}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {Object.values(APTS).map((a,i)=>(
                <tr key={a.id}
                  onClick={()=>setSelUnit({type:'apt',data:a})}
                  onMouseEnter={e=>e.currentTarget.style.background='#F0FDF4'}
                  onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#F8F8F6':'white'}
                >
                  <td><strong>{a.ar}</strong></td>
                  <td style={{color:'var(--mid)',fontSize:'.82rem'}}>{a.level}</td>
                  <td>{a.netArea} م²</td>
                  <td>{a.totalArea} م²</td>
                  <td style={{fontFamily:'var(--ff-d)',fontSize:'1.05rem'}}>{fmtPrice(a.cashPrice)}</td>
                  <td style={{color:'var(--mid)',fontFamily:'var(--ff-d)',fontSize:'1.05rem'}}>{fmtPrice(a.installPrice)}</td>
                </tr>
              ))}
              <tr><td colSpan={6} style={{background:'var(--ink)',color:'var(--bg)',fontFamily:'var(--ff-ar)',fontSize:'.78rem',fontWeight:500,padding:'.875rem 1rem'}}>الطابق التجاري — المحلات المتاحة</td></tr>
              {SHOPS.filter(s=>s.available).map((s,i)=>(
                <tr key={s.id}
                  onClick={()=>setSelUnit({type:'shop',label:s.ar,data:s})}
                  onMouseEnter={e=>e.currentTarget.style.background='#F0FDF4'}
                  onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#F8F8F6':'white'}
                  style={{cursor:'pointer'}}
                >
                  <td><strong>{s.ar}</strong></td>
                  <td style={{color:'var(--mid)',fontSize:'.82rem'}}>الطابق الأرضي</td>
                  <td>{s.area} م²</td>
                  <td>{s.area} م²</td>
                  <td style={{fontFamily:'var(--ff-d)',fontSize:'1.05rem'}}>{s.cashPrice?fmtPrice(s.cashPrice):'للاستفسار'}</td>
                  <td style={{color:'var(--green)',fontSize:'.88rem',fontFamily:'var(--ff-ar)'}}>تواصل عبر واتساب</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </section>

      {/* ── CONTACT ── */}
      <section className="sec" id="contact" style={{background:'#EFEFEB'}} data-screen-label="04 تواصل">
        <div className="sec-label">تواصل معنا</div>
        <h2 className="sec-title">تواصل معنا</h2>
        <div className="sec-rule"/>
        <div className="contact-grid">
          {/* 1 — WhatsApp */}
          <div>
            <h3 className="contact-h3">هل أنت مستعد للعثور على منزلك المثالي؟</h3>
            <p className="contact-p">فريقنا المتخصص جاهز لمساعدتك في اختيار الوحدة المناسبة، وترتيب زيارة الموقع، وإتمام إجراءات الشراء في عمارة العطاء.</p>
            <a href="https://wa.me/972595373660?text=أهلاً، أرغب في الاستفسار عن عمارة العطاء." target="_blank" rel="noopener noreferrer" className="wa-btn">
              <WaIcon/> تواصل عبر واتساب
            </a>
          </div>

          {/* 2 — Form */}
          <form onSubmit={async e=>{
            e.preventDefault();
            setForm(p=>({...p,loading:true,error:false}));
            try{
              const r=await fetch('https://formspree.io/f/mqewjagb',{
                method:'POST',
                headers:{'Content-Type':'application/json','Accept':'application/json'},
                body:JSON.stringify({name:form.name,email:form.email,message:form.msg})
              });
              if(r.ok) setForm(p=>({...p,sent:true,loading:false}));
              else setForm(p=>({...p,loading:false,error:true}));
            }catch{setForm(p=>({...p,loading:false,error:true}));}
          }}>
            {form.sent ? (
              <div className="form-ok">✓ &nbsp; شكراً لتواصلك — سيتصل بك فريقنا قريباً.</div>
            ) : (
              <>
                <div className="form-f"><label>الاسم الكامل</label><input type="text" required placeholder="اسمك الكامل" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
                <div className="form-f"><label>البريد الإلكتروني</label><input type="email" required placeholder="بريدك الإلكتروني" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/></div>
                <div className="form-f"><label>رسالتك</label><textarea rows={4} placeholder="أخبرنا عن متطلباتك…" value={form.msg} onChange={e=>setForm(p=>({...p,msg:e.target.value}))}/></div>
                <button type="submit" className="btn-p" style={{width:'100%',justifyContent:'center'}} disabled={form.loading}>
                  {form.loading ? '...جاري الإرسال' : 'إرسال الرسالة'}
                </button>
                {form.error && <div style={{marginTop:'.75rem',fontSize:'.85rem',color:'#c0392b',fontFamily:'var(--ff-ar)'}}>حدث خطأ أثناء الإرسال. يرجى المحاولة مرة أخرى.</div>}
              </>
            )}
          </form>

          {/* 3 — Maps + Photo */}
          <div className="media-row">
            <div style={{borderRadius:'4px',overflow:'hidden',height:'320px'}}>
              <LazyMap src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1049.2706196241875!2d35.236671349690674!3d32.22753090661303!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sar!2s!4v1777133165290!5m2!1sar!2s"/>
            </div>
            <div style={{borderRadius:'4px',overflow:'hidden',height:'320px',background:'#F0F0EC',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <img src="building.webp" alt="عمارة العطاء" style={{width:'100%',height:'100%',objectFit:'contain',display:'block'}}/>
            </div>
          </div>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer data-screen-label="05 التذييل">
        <div className="ft-brand">عمارة العطاء · Al-Ataa Building</div>
        <div className="ft-credit">
          تطوير: <a href="https://suhaib-thaher.netlify.app/" target="_blank" rel="noopener noreferrer">suhaib ghassan thaher</a>
        </div>
      </footer>

      {/* ── MODAL ── */}
      {selUnit && <UnitModal unit={selUnit} onClose={()=>setSelUnit(null)}/>}

      {/* ── FLOATING WHATSAPP ── */}
      <a href="https://wa.me/972595373660" target="_blank" rel="noopener noreferrer" className="fab" title="واتساب">
        <WaIcon/>
      </a>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
